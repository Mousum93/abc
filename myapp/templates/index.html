<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        label{
            display:block;
            margin-top:10px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            margin-bottom:10px;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        .error{
            color:red;
            margin-bottom:10px;
        }

        .success{
            color:green;
            margin-bottom:10px;
        }

        .forgot{
            text-align:center;
            margin-top:15px;
        }

        .forgot a{
            text-decoration:none;
            color:#007bff;
        }

        .forgot a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Login Form</h1>

    <form method="post">
        {% csrf_token %}

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        {% if msg %}
        <p class="success">{{ msg }}</p>
        {% endif %}

        <label>Username</label>
        <input type="text" name="uname" placeholder="Enter username">

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password">

        <button type="submit">Login</button>
    </form>

    <div class="forgot">
        <a href="{% url 'forget' %}">Forgot Password?</a>
    </div>
</div>

</body>
</html>
